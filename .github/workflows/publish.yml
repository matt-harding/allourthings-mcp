name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish-mcp-server:
    name: Publish @allourthings/mcp-server
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for provenance signing

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        working-directory: packages/mcp-server
        run: bun run typecheck

      - name: Run tests
        working-directory: packages/mcp-server
        run: bun test

      - name: Build
        working-directory: packages/mcp-server
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        working-directory: packages/mcp-server
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli:
    name: Publish @allourthings/cli
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for provenance signing

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        working-directory: packages/cli
        run: bun run typecheck

      - name: Build
        working-directory: packages/cli
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
