name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        working-directory: packages/mcp-server
        run: bun run typecheck

      - name: Run tests
        working-directory: packages/mcp-server
        run: bun test

      - name: Build
        working-directory: packages/mcp-server
        run: bun run build
