version: "3"

vars:
  SERVER: packages/mcp-server
  WEBSITE: packages/website
  # Default vault path for local dev/testing.
  # Override: DATA_DIR=/your/path task <command>
  DATA_DIR: "{{.DATA_DIR | default \"./dev-vault\"}}"

tasks:

  # ── Development ────────────────────────────────────────────────────────────

  dev:mcp:
    desc: Start MCP server in watch mode (stdio)
    dir: "{{.SERVER}}"
    env:
      ALLOURTHINGS_DATA_DIR: "{{.DATA_DIR}}"
    cmd: bun run dev

  website:dev:
    desc: Start website dev server
    dir: "{{.WEBSITE}}"
    cmd: bun run dev

  website:build:
    desc: Build website for production
    dir: "{{.WEBSITE}}"
    cmd: bun run build

  website:deploy:
    desc: Build and deploy website to Cloudflare Pages
    dir: "{{.WEBSITE}}"
    dotenv: ["../../.env"]
    cmds:
      - task: website:build
      - bunx wrangler pages deploy dist --project-name allourthings

  build:
    desc: Compile MCP server to dist/
    dir: "{{.SERVER}}"
    cmd: bun run build

  typecheck:
    desc: Run TypeScript type checking
    dir: "{{.SERVER}}"
    cmd: bun run typecheck

  # ── Testing ────────────────────────────────────────────────────────────────

  inspect:
    desc: Open MCP Inspector in dev mode (no build required)
    cmd: npx @modelcontextprotocol/inspector bun {{.SERVER}}/src/index.ts --data-dir {{.DATA_DIR}}

  inspect:prod:
    desc: Build then open MCP Inspector against compiled dist
    deps: [build]
    cmd: npx @modelcontextprotocol/inspector bun {{.SERVER}}/dist/index.js --data-dir {{.DATA_DIR}}

  seed:
    desc: Append test items to the vault
    cmd: bun {{.SERVER}}/scripts/seed.ts --data-dir {{.DATA_DIR}}

  seed:reset:
    desc: Clear vault and re-seed with test items
    cmd: bun {{.SERVER}}/scripts/seed.ts --data-dir {{.DATA_DIR}} --reset

  # Seed then immediately open Inspector — the fastest way to start testing
  dev:
    desc: Seed vault and open MCP Inspector
    cmds:
      - task: seed:reset
      - task: inspect

  # ── Automated tests ────────────────────────────────────────────────────────

  test:run:
    desc: Run all automated tests
    dir: "{{.SERVER}}"
    cmd: bun test

  # ── Housekeeping ───────────────────────────────────────────────────────────

  clean:
    desc: Remove compiled output
    cmd: rm -rf {{.SERVER}}/dist

  clean:vault:
    desc: Delete the local dev vault
    cmd: rm -rf "{{.DATA_DIR}}"
